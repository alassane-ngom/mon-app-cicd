name: CI — Tests Automatiques

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Lancer les tests Node.js
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4
        # "uses" = utiliser une action prête à l'emploi
        # actions/checkout@v4 = télécharge ton code sur le Runner

      - name: ⚙️ Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Lancer les tests
        run: npm test
