<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Réserver un service</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .info {
            background: #eef;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Réserver un service</h1>

    <div class="box">

        <div class="info" id="selectedService">
            Service sélectionné : ...
        </div>

        <label>Date</label>
        <input type="date" id="date">

        <label>Heure</label>
        <input type="time" id="heure">

        <button onclick="reserver()">Confirmer la réservation</button>

    </div>

    <script>

        // 🔹 récupérer service sélectionné (workflow étape 1)
        const serviceId = localStorage.getItem("service_id");

        document.getElementById("selectedService").innerText =
            "Service sélectionné : " + serviceId;

        // 🔹 créer réservation (mock backend-ready)
        function reserver() {

            const reservation = {
                service_id: serviceId,
                date: document.getElementById("date").value,
                heure: document.getElementById("heure").value
            };

            // validation simple
            if (!reservation.date || !reservation.heure) {
                alert("Veuillez remplir tous les champs");
                return;
            }

            // stockage temporaire (backend futur remplacera ça)
            let reservations = JSON.parse(localStorage.getItem("reservations")) || [];
            reservations.push(reservation);

            localStorage.setItem("reservations", JSON.stringify(reservations));

            alert("Réservation enregistrée !");

            window.location.href = "/tickets.html";
        }

    </script>

</body>

</html>
