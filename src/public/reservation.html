<!DOCTYPE html>
<html lang="fr">


<head>
    <meta charset="UTF-8">
    <title>Réserver un service</title>


    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }


        h1 {
            text-align: center;
        }


        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }


        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }


        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }


        button:hover {
            background: darkgreen;
        }


        .info {
            background: #eef;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
    </style>
</head>


<body>


    <h1>Réserver un service</h1>


    <div class="box">


        <div class="info" id="selectedService">
            Service sélectionné : ...
        </div>


        <label>Date</label>
        <input type="date" id="date">


        <label>Heure</label>
        <input type="time" id="heure">


        <button onclick="reserver()">Confirmer la réservation</button>


    </div>


  <script>


const serviceId = localStorage.getItem("service_id");


// ⚠️ temporaire (car pas encore login)
const clientId = 1;


document.getElementById("serviceInfo").innerText =
    "Service sélectionné : " + serviceId;


async function reserver() {


    const dateReservation = document.getElementById("date").value;


    if (!dateReservation) {
        alert("Choisis une date");
        return;
    }


    try {


        const response = await fetch("/api/reservations", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({


                serviceId: Number(serviceId),
                clientId: clientId,
                dateReservation: dateReservation,
                commentaire: null
            })
        });


        const data = await response.json();


        console.log("Réponse backend:", data);


        if (!response.ok) {
            alert(data.message || "Erreur réservation ❌");
            return;
        }


        alert("Réservation réussie ✅");


        window.location.href = "/tickets.html";


    } catch (error) {


        console.error(error);
        alert("Erreur serveur ❌");
    }
}


</script>
