<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes tickets</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: auto;
        }

        .ticket {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .empty {
            text-align: center;
            color: gray;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Mes tickets</h1>

    <div class="container" id="tickets"></div>
<script>

async function loadTickets() {

    try {
        const response = await fetch("/api/reservations");
        const reservations = await response.json();

        const container = document.getElementById("tickets");

        if (!reservations || reservations.length === 0) {
            container.innerHTML = "<p>Aucune réservation trouvée</p>";
            return;
        }

        let html = "";

        reservations.forEach((r, index) => {
            html += `
                <div class="ticket">
                    <h3>Ticket #${index + 1}</h3>
                    <p><strong>Service ID:</strong> ${r.serviceId}</p>
                    <p><strong>Client ID:</strong> ${r.clientId}</p>
                    <p><strong>Date:</strong> ${r.dateReservation}</p>
                    <p><strong>Statut:</strong> ${r.statut}</p>
                </div>
            `;
        });

        container.innerHTML = html;

    } catch (error) {
        console.error("Erreur tickets:", error);
        document.getElementById("tickets").innerHTML =
            "<p>Erreur chargement tickets</p>";
    }
}

loadTickets();

</script>
</body>

</html>
